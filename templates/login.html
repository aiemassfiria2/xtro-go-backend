<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro GO - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0A1628 0%, #1A3A6E 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #1A3A6E; font-size: 24px; margin-top: 10px; }
        .logo .play-icon {
            width: 60px; height: 60px; background: #FFD700; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center; margin-bottom: 10px;
        }
        .logo .play-icon::after {
            content: ""; display: block; width: 0; height: 0;
            border-style: solid; border-width: 12px 0 12px 20px;
            border-color: transparent transparent transparent #0A1628; margin-left: 4px;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; color: #666; font-size: 14px; font-weight: 500; }
        input {
            width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0;
            border-radius: 10px; font-size: 16px; transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #FFD700; }
        button {
            width: 100%; padding: 14px; background: #FFD700; color: #0A1628;
            border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        button:hover { background: #E6C200; }
        .hint { text-align: center; margin-top: 20px; color: #999; font-size: 13px; }
        .code-badge { text-align: center; margin-bottom: 20px; font-size: 14px; color: #666; }
        .code-badge span { background: #f0f0f0; padding: 4px 12px; border-radius: 6px; font-family: monospace; font-size: 16px; font-weight: bold; color: #1A3A6E; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo"><div class="play-icon"></div><h1>Astro GO</h1></div>
        <div class="code-badge">Code: <span>{{ code }}</span></div>
        <form action="/login/submit" method="POST">
            <input type="hidden" name="code" value="{{ code }}">
            <div class="form-group"><label>Email / Username</label><input type="email" name="email" placeholder="your@email.com" required autofocus></div>
            <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="Enter password" required></div>
            <button type="submit">Sign In to Astro GO</button>
        </form>
        <div class="hint">Use your Astro GO account credentials</div>
    </div>
</body>
</html>
